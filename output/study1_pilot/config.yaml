job: extension
config:
  name: study1_pilot
  process:
  - type: sd_trainer
    training_folder: output
    performance_log_every: 100
    device: cuda:0
    network:
      type: lora
      linear: 16
      linear_alpha: 16
    save:
      dtype: float16
      save_every: 100
      max_step_saves_to_keep: 5
      push_to_hub: false
    datasets:
    - folder_path: training/study1_pilot/train
      caption_ext: txt
      caption_dropout_rate: 0.05
      shuffle_tokens: false
      cache_latents_to_disk: true
      resolution:
      - 512
      - 768
      - 1024
    logging:
      use_wandb: true
      project_name: incontext-lora
      run_name: study1-pilot
    train:
      batch_size: 1
      steps: 500
      gradient_accumulation_steps: 4
      train_unet: true
      train_text_encoder: false
      gradient_checkpointing: true
      noise_scheduler: flowmatch
      optimizer: adamw8bit
      lr: 0.0001
      ema_config:
        use_ema: true
        ema_decay: 0.99
      dtype: bf16
    model:
      name_or_path: black-forest-labs/FLUX.1-dev
      is_flux: true
      quantize: true
    sample:
      sampler: flowmatch
      sample_every: 100
      width: 1024
      height: 1024
      prompts:
      - '[FOUR-VIEWS] Four views of A clear plastic container of Chinese snacks, specifically
        sesame candy, labeled with a green and white ''Weilong Moyu Shuang'' brand
        tag.; [TOP-LEFT] Left side, high angle; clear plastic container lid and body,
        green and white brand tag with Chinese characters, barcode on the side of
        the tag, partially visible sesame candy inside; [TOP-RIGHT] Front, high angle;
        front of the green and white brand tag with ''Moyu Shuang'' logo, clear plastic
        container lid, sesame candy visible inside the container; [BOTTOM-LEFT] Front-right
        three-quarter, high angle; front of the green and white brand tag, green label
        on the side of the container with ''Sesame Candy'' in Chinese, stacked clear
        plastic containers, sesame candy visible inside; [BOTTOM-RIGHT] Rear-right
        three-quarter, high angle; back of the green label on the container, green
        and white brand tag, stacked clear plastic containers, background showing
        a store aisle with people.'
      - '[FOUR-VIEWS] Four views of A light beige long-sleeved baby sweatshirt with
        a small chest pocket, hanging on a blue hanger from a white coat rack.; [TOP-LEFT]
        Front-right three-quarter, eye-level; right sleeve, front chest pocket, crew
        neckline, blue hanger, white coat rack stand; [TOP-RIGHT] Front, eye-level;
        front chest pocket, both sleeves, crew neckline, blue hanger, white coat rack
        stand; [BOTTOM-LEFT] Front, eye-level; front chest pocket, both sleeves, crew
        neckline, blue hanger, white coat rack stand; [BOTTOM-RIGHT] Front-left three-quarter,
        eye-level; left sleeve, front chest pocket, crew neckline, blue hanger, white
        coat rack stand.'
      neg: ''
      seed: 17
      walk_seed: false
      guidance_scale: 3.5
      sample_steps: 20
meta:
  name: study1_pilot
  version: '1.0'
